<svg width="1280" height="360" viewBox="0 0 1280 360" fill="none" xmlns="http://www.w3.org/2000/svg" role="img" aria-labelledby="title desc">
  <title id="title">ReadingHelper Agent and Text Annotation Framework</title>
  <desc id="desc">A banner for a project that combines an English reading assistant with a reusable text annotation framework.</desc>
  <defs>
    <linearGradient id="sky" x1="0" y1="0" x2="1280" y2="360" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#20345C"/>
      <stop offset="0.48" stop-color="#496E91"/>
      <stop offset="1" stop-color="#E9C999"/>
    </linearGradient>
    <linearGradient id="panel" x1="46" y1="54" x2="1018" y2="321" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#FFF8E8" stop-opacity="0.96"/>
      <stop offset="1" stop-color="#F0E2C5" stop-opacity="0.78"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%" color-interpolation-filters="sRGB">
      <feDropShadow dx="0" dy="18" stdDeviation="22" flood-color="#10203D" flood-opacity="0.32"/>
    </filter>
    <pattern id="grid" width="28" height="28" patternUnits="userSpaceOnUse">
      <path d="M28 0H0V28" stroke="#FFFFFF" stroke-opacity="0.07"/>
    </pattern>
  </defs>

  <rect width="1280" height="360" fill="url(#sky)"/>
  <rect width="1280" height="360" fill="url(#grid)"/>

  <circle cx="1104" cy="62" r="2.5" fill="#FFF8DA"/>
