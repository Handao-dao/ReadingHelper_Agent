    <text x="86" y="116" fill="#4F3721" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="28" font-weight="800" letter-spacing="1.5">ReadingHelper Agent</text>
    <text x="86" y="178" fill="#172A49" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="58" font-weight="850">Readable Text,</text>
    <text x="86" y="238" fill="#172A49" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="58" font-weight="850">Reusable Annotations</text>
    <text x="90" y="274" fill="#5D6B7E" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="20" font-weight="600">English reading assistant · Generic text annotation framework</text>
