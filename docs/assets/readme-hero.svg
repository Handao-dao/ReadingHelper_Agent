  <path d="M1048 54L1076 45" stroke="#FFF6C9" stroke-width="2" stroke-linecap="round" opacity="0.5"/>

  <path d="M0 282C156 219 271 235 411 260C597 293 728 310 902 247C1058 190 1179 203 1280 240V360H0V282Z" fill="#415C87" opacity="0.72"/>
  <path d="M0 312C181 271 319 284 473 307C659 334 782 333 936 286C1086 240 1193 254 1280 287V360H0V312Z" fill="#263F67" opacity="0.74"/>
